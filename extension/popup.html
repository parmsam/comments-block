<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      width: 220px;
      padding: 16px;
      background: #fff;
      color: #333;
    }
    h2 {
      font-size: 13px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .row:last-child { border-bottom: none; }
    /* Toggle switch */
    .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc; border-radius: 20px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #ff0000; }
    input:checked + .slider::before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h2>Comments Block</h2>
  <div class="row">
    <span>Hide comments</span>
    <label class="switch">
      <input type="checkbox" id="blockComments">
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <span>Hide recommendations</span>
    <label class="switch">
      <input type="checkbox" id="blockRecommendations">
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <span>Hide live chat</span>
    <label class="switch">
      <input type="checkbox" id="blockLiveChat">
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <span>Hide Shorts</span>
    <label class="switch">
      <input type="checkbox" id="blockShorts">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
